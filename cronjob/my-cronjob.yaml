apiVersion: batch/v1
kind: CronJob
metadata:
  name: my-cj
spec:
  suspend: true
  failedJobsHistoryLimit: 5
  successfulJobsHistoryLimit: 10
  schedule: "* * * * *"
  jobTemplate:
    spec:
      parallelism: 5
      completions: 10
      completionMode: "Indexed"
      templete:
        spec:
      containers:
        - name: my-container-busybox
          image: busybox
          command:
            - "bin/sh"
            - "-c"
            - "for i in 1 2; do echo Lucky number $i = $((1 + RANDON % )); done"
      restartPolicy: Never
