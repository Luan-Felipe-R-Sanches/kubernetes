apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: my-damonset
  labels:
    app: frontend

spec:
  template:
    metadata:
      name: pod-web-server
      labels:
          apps: my-app
          tier: frontend
    spec:
      containers:
        - name: my-container-ngix
          image: nginx
      nodeName: minekube

    selector:
      matchLabels:
        apps: my-app
