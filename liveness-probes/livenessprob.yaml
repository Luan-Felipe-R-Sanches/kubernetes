apiVersion: v1
kind: Pod
metadata:
  name: liveness-pod
spec:
  container:
    - name: libess-container-test
      image: busybox
      args:
        - /bin/sh
        - c
        - touch /tmp/healthy; sleep 30; rm -f /tmp/healthy; sleep 600

      livenesProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
      initialDelaySeconds: 5
      periodSeconds: 5
      failureThreshold: 3
